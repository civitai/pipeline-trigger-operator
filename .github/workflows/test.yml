name: test

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.20'
      - name: Build
        run: go build ./...
      - name: Test
        # internal/controller has an envtest Ginkgo suite that needs
        # KUBEBUILDER_ASSETS (sigs.k8s.io/.../setup-envtest); it FAILS without
        # those binaries, so it is intentionally excluded here and run locally.
        # All fork-specific unit coverage lives in ./api/... and ./pkg/...
        run: go test ./api/... ./pkg/...
